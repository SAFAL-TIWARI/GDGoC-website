<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GDGoC SATI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h2>GDGoC SATI - Admin Panel</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Back to Website</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-container">
        <div class="container">
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="members">Members</button>
                <button class="tab-btn" data-tab="events">Events</button>
                <button class="tab-btn" data-tab="projects">Projects</button>
                <button class="tab-btn" data-tab="meetings">Meetings</button>
                <button class="tab-btn" data-tab="tasks">Tasks</button>
                <button class="tab-btn" data-tab="data">Data Management</button>
            </div>

            <!-- Members Tab -->
            <div id="members-tab" class="tab-content active">
                <h2>Manage Members</h2>
                <form id="memberForm" class="admin-form">
                    <input type="hidden" id="memberId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Name *</label>
                            <input type="text" id="memberName" required>
                        </div>
                        <div class="form-group">
                            <label>Role *</label>
                            <select id="memberRole" required>
                                <option value="">Select Role</option>
                                <option value="Lead">Lead</option>
                                <option value="Co-Lead">Co-Lead</option>
                                <option value="Technical Lead">Technical Lead</option>
                                <option value="Event Lead">Event Lead</option>
                                <option value="Design Lead">Design Lead</option>
                                <option value="Member">Member</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="memberEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="memberPhone">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Branch</label>
                            <input type="text" id="memberBranch" placeholder="e.g., Computer Science">
                        </div>
                        <div class="form-group">
                            <label>Year</label>
                            <select id="memberYear">
                                <option value="">Select Year</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Skills (comma-separated)</label>
                            <input type="text" id="memberSkills" placeholder="e.g., JavaScript, Python, React">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Member</button>
                    <button type="button" class="btn btn-secondary" onclick="resetMemberForm()">Reset</button>
                </form>
                <div id="membersList" class="admin-list"></div>
            </div>

            <!-- Events Tab -->
            <div id="events-tab" class="tab-content">
                <h2>Manage Events</h2>
                <form id="eventForm" class="admin-form">
                    <input type="hidden" id="eventId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Event Name *</label>
                            <input type="text" id="eventName" required>
                        </div>
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="eventTime">
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="eventLocation">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Description *</label>
                            <textarea id="eventDescription" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="eventCategory">
                                <option value="Workshop">Workshop</option>
                                <option value="Hackathon">Hackathon</option>
                                <option value="Study Jam">Study Jam</option>
                                <option value="Meetup">Meetup</option>
                                <option value="Webinar">Webinar</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Registration Link</label>
                            <input type="url" id="eventLink">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Event</button>
                    <button type="button" class="btn btn-secondary" onclick="resetEventForm()">Reset</button>
                </form>
                <div id="eventsList" class="admin-list"></div>
            </div>

            <!-- Projects Tab -->
            <div id="projects-tab" class="tab-content">
                <h2>Manage Projects</h2>
                <form id="projectForm" class="admin-form">
                    <input type="hidden" id="projectId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Project Name *</label>
                            <input type="text" id="projectName" required>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="projectStatus">
                                <option value="Planning">Planning</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Description *</label>
                            <textarea id="projectDescription" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Technologies (comma-separated)</label>
                            <input type="text" id="projectTech" placeholder="e.g., React, Node.js, MongoDB">
                        </div>
                        <div class="form-group">
                            <label>GitHub Link</label>
                            <input type="url" id="projectGithub">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Team Members (comma-separated)</label>
                            <input type="text" id="projectTeam" placeholder="e.g., John Doe, Jane Smith">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Project</button>
                    <button type="button" class="btn btn-secondary" onclick="resetProjectForm()">Reset</button>
                </form>
                <div id="projectsList" class="admin-list"></div>
            </div>

            <!-- Meetings Tab -->
            <div id="meetings-tab" class="tab-content">
                <h2>Manage Meetings</h2>
                <form id="meetingForm" class="admin-form">
                    <input type="hidden" id="meetingId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Meeting Title *</label>
                            <input type="text" id="meetingTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="meetingDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Time *</label>
                            <input type="time" id="meetingTime" required>
                        </div>
                        <div class="form-group">
                            <label>Duration (minutes)</label>
                            <input type="number" id="meetingDuration" value="60">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Agenda</label>
                            <textarea id="meetingAgenda" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Meeting Report</label>
                            <textarea id="meetingReport" rows="3" placeholder="Add meeting notes and decisions"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Meeting</button>
                    <button type="button" class="btn btn-secondary" onclick="resetMeetingForm()">Reset</button>
                </form>
                <div id="meetingsList" class="admin-list"></div>
            </div>

            <!-- Tasks Tab -->
            <div id="tasks-tab" class="tab-content">
                <h2>Manage Tasks</h2>
                <form id="taskForm" class="admin-form">
                    <input type="hidden" id="taskId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Task Title *</label>
                            <input type="text" id="taskTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Priority</label>
                            <select id="taskPriority">
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea id="taskDescription" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Assigned To *</label>
                            <input type="text" id="taskAssignedTo" required>
                        </div>
                        <div class="form-group">
                            <label>Due Date *</label>
                            <input type="date" id="taskDueDate" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Status</label>
                            <select id="taskStatus">
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                    <button type="button" class="btn btn-secondary" onclick="resetTaskForm()">Reset</button>
                </form>
                <div id="tasksList" class="admin-list"></div>
            </div>

            <!-- Data Management Tab -->
            <div id="data-tab" class="tab-content">
                <h2>Data Management</h2>
                <div class="data-management">
                    <div class="data-card">
                        <h3>Export Data</h3>
                        <p>Download all data as JSON file</p>
                        <button onclick="exportData()" class="btn btn-primary">
                            <i class="fas fa-download"></i> Export Data
                        </button>
                    </div>
                    <div class="data-card">
                        <h3>Import Data</h3>
                        <p>Upload JSON file to import data</p>
                        <input type="file" id="importFile" accept=".json" style="display:none">
                        <button onclick="document.getElementById('importFile').click()" class="btn btn-secondary">
                            <i class="fas fa-upload"></i> Choose File
                        </button>
                    </div>
                    <div class="data-card warning">
                        <h3>Clear All Data</h3>
                        <p>Warning: This action cannot be undone!</p>
                        <button onclick="clearAllData()" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Clear Data
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
